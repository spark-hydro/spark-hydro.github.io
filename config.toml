  writeStats = true

[params]
enable_dynamic_colors = false
name = "iHydro M&D Lab"
firstName = "iHydro M&D Lab"
# lastName = "Cordero"
email = "seonggyu.park@ttu.com"
profile_image = "/images/avatar.jpg"
author = "iHydro M&D Research Group"

og_image = "images/felipecordero-og.png"

description = "iHydro M&D Research Group at Texas Tech University focuses on integrated hydrological modeling and data-driven water resources management. Our research advances uncertainty quantification, management scenario analysis, and decision-support frameworks to support sustainable water and environmental systems."

linkedin_url = "https://www.linkedin.com/in/spark-hydro"
linkedin_text = "linkedin.com/in/spark-hydro"
github_url = "https://github.com/spark-hydro"
github_text = "github.com/spark-hydro"

calendly_url = "https://outlook.office.com/bookwithme/user/ad0eb57f879e4dc798a270638694946c@ttu.edu/meetingtype/ZcsLT8XN30ie_INqJQ9PFQ2?anonymous&ismsaljsauthenabled&ep=mlink"
