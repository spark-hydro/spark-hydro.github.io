# Form and Pexels: set in config or config.local.toml. CI: HUGO_PARAMS_FORMSPREEENDPOINT, HUGO_PARAMS_PEXELSAPIKEY (no underscores)
formspreeendpoint = ""
pexelsapikey = ""

[[params.social]]
icon = "linkedin-in"
url = "https://www.linkedin.com/in/spark-hydro/"

[[params.social]]
icon = "github"
url = "https://github.com/spark-hydro"

sectionPagesMenu = 'main'


[taxonomies]
  tag = "tags"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = "monokai"

[server]
  [[server.headers]]
    for = "/**/*.css"
    [server.headers.values]
      Content-Type = "text/css"

