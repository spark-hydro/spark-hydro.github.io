# Hugo Site Configuration
baseURL = "https://spark-hydro.github.io/"
languageCode = "en-us"
title = "iHydro M&D"
theme = "careercanvas"
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false

[languages]
  [languages.en]
    contentDir = "content/en"
    languageName = "English"
    weight = 1
    [languages.en.params]
      tagline = "integrated hydrological modeling. uncertainty quantification. data-driven analysis"
      hero_description = "The iHydro M&D Research Group at Texas Tech University focuses on integrated hydrological modeling and data-driven water resources management, advancing uncertainty quantification and decision-support frameworks for sustainable water resources."
      hero_location = "Texas Tech University, USA"
      # resume_url = "https://localhost:1313/spark-cv/"
      resume_url = "https://spark-hydro.github.io/spark-cv"
      collab_tags = [
        "Integrated Hydrological Modeling",
        "Uncertainty Quantification", 
        "Data-Driven Analysis",
        "Water Resources Management",
        "Sustainable Water Systems"
      ]
  [languages.ko]
    contentDir = "content/ko"
    languageName = "한국어"
    weight = 2
    [languages.ko.params]
      tagline = "통합수문모델링. 불확실성 정량화. 데이터 기반 분석. 수자원 관리. 지속가능한 수자원 시스템 개발"
      hero_description = "텍사스텍에서 iHydro M&D 연구 그룹은 통합 수문 모델링과 데이터 기반 수자원 관리를 중심으로 연구를 수행하며, 지속가능한 수자원을 위한 불확실성 정량화와 의사결정 지원 프레임워크의 발전에 기여하고 있습니다."
      hero_location = "텍사스텍, 미국"
      resume_url = "https://spark-hydro.github.io/spark-cv"
      collab_tags = [
        "통합수문모델링",
        "불확실성 정량화",
        "데이터 기반 분석",
        "수자원 관리",
        "지속가능한 수자원시스템"
      ]
